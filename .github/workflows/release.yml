name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-pi:
    runs-on: ubuntu-24.04

    container: debian:12

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            git \
            make \
            cmake \
            g++ \
            gcc \
            crossbuild-essential-arm64 \
            ca-certificates \
            zip

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build for Pi (aarch64)
        run: |
          make -j$(nproc) ANNEAL_TARGET=pi \
            CXX=aarch64-linux-gnu-g++ \
            CC=aarch64-linux-gnu-gcc

      - name: Package
        run: ./scripts/package.sh pi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: annealscreen-pi
          path: build/release/annealscreen-pi.zip

  release:
    needs: [build-pi]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            annealscreen-pi/annealscreen-pi.zip
          generate_release_notes: true
